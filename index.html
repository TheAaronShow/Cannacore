
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CannaCore - Inicio</title>

    <style>
        /* Fondo completo sin recortes */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url("fondoo.jpg");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            padding: 15px 10px;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.30);
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #9fff55;
        }

        /* MENÚ DERECHO */
        .navbar-links {
            display: flex;
            gap: 25px;
            padding-right: 20px;
            transition: 0.3s ease;
        }

        .navbar a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .navbar a:hover {
            color: #9fff55;
        }

        /* HAMBURGUESA */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: white;
            border-radius: 3px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .navbar-links {
                display: none;
                position: absolute;
                top: 60px;
                right: 10px;
                background: rgba(0, 0, 0, 0.85);
                flex-direction: column;
                padding: 15px 20px;
                border-radius: 10px;
                gap: 15px;
            }

            .navbar-links.show {
                display: flex;
            }

            .hamburger {
                display: flex;
            }
        }

        .overlay {
            width: 100%;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            padding-top: 100px;
        }

        /* POP-UP LOGIN */
        .modal-bg {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: #111;
            padding: 25px 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            border: 1px solid #9fff55;
            box-shadow: 0 0 20px rgba(159,255,85,0.4);
        }

        .modal h2 {
            margin: 0 0 15px;
            color: #9fff55;
        }

        .modal input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
        }

        .modal button {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: #9fff55;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        .close-btn {
            margin-top: 10px;
            cursor: pointer;
            color: #bbb;
            font-size: 0.9rem;
        }

        .close-btn:hover {
            color: white;
        }

    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <!-- LOGO IZQUIERDA -->
        <div class="logo">CANNA CORE</div>

        <!-- HAMBURGUESA -->
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- MENÚ DERECHO -->
        <div class="navbar-links" id="menu">
            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Nosotros</a>
            <a href="#">Contacto</a>
            <a onclick="openLogin()">Iniciar sesión</a>
        </div>

    </div>

    <div class="overlay"></div>

    <!-- POP-UP LOGIN -->
    <div class="modal-bg" id="loginModal">
        <div class="modal">
            <h2>Iniciar sesión</h2>

            <input type="email" placeholder="Correo electrónico">
            <input type="password" placeholder="Contraseña">

            <button>Entrar</button>

            <div class="close-btn" onclick="closeLogin()">Cerrar</div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("show");
        }

        function openLogin() {
            document.getElementById("loginModal").style.display = "flex";
        }

        function closeLogin() {
            document.getElementById("loginModal").style.display = "none";
        }
    </script>

</body>
</html>
