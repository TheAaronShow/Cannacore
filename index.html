
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CannaCore - Inicio</title>

    <style>
        /* Fondo completo sin recortes */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url("fondoo.jpg");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            padding: 15px 10px; /* ← AQUI SE AJUSTA EL ESPACIO DE AMBOS LADOS */
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.30);
            z-index: 1000;

            display: flex;
            justify-content: space-between; 
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #9fff55;
        }

        .navbar-links {
            display: flex;
            gap: 25px;
            padding-right: 20px; /* ← MUEVE EL MENÚ MÁS A LA IZQUIERDA */
        }

        .navbar a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #9fff55;
        }

        /* Zona central */
        .overlay {
            width: 100%;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 100px;
            text-align: center;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        h2 {
            color: #9fff55;
            font-size: 1.7rem;
            font-weight: 600;
        }
        p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: auto;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <!-- IZQUIERDA -->
        <div class="logo">CANNA CORE</div>

        <!-- DERECHA -->
        <div class="navbar-links">
            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Nosotros</a>
            <a href="#">Contacto</a>
        </div>

    </div>

    <!-- CONTENIDO CENTRAL -->
    <div class="overlay">
        <div class="wrapper">
            <h1>CANNA CORE GROUP</h1>
            <h2>Asesoramos hoy, construimos el futuro</h2>
            <p>
                Soluciones estratégicas para el sector cannábico, con visión, sostenibilidad y cumplimiento normativo.
            </p>
        </div>
    </div>

</body>
</html>
