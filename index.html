
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CannaCore - Inicio</title>

    <style>
        /* Fondo */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url("fondooo.jpg");
            font-family: Arial, sans-serif;
            color: white;
        }

        /* Contenedor principal (limita el ancho de toda la página) */
        .wrapper {
            max-width: 1100px;  /* ← AJUSTA AQUÍ EL ANCHO GENERAL */
            margin: 0 auto;     /* Centrado automático */
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;

            display: flex;
            justify-content: center; /* Centramos todo */
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.30);

            z-index: 1000;
        }

        .navbar-content {
            width: 100%;
            max-width: 1100px; /* Coincide con el ancho del contenido */
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #9fff55;
        }

        .navbar a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #9fff55;
        }

        /* Overlay */
        .overlay {
            width: 100%;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 80px; /* Evita que el navbar tape el contenido */
            padding-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        h2 {
            color: #9fff55;
            font-size: 1.7rem;
            font-weight: 600;
            margin-top: 0;
        }
        p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: auto;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo">CANNA CORE</div>

            <div>
                <a href="#">Inicio</a>
                <a href="#">Servicios</a>
                <a href="#">Nosotros</a>
                <a href="#">Contacto</a>
            </div>
        </div>
    </div>

    <!-- CONTENIDO CENTRAL -->
    <div class="overlay">
        <div class="wrapper">

            <h1>CANNA CORE GROUP</h1>
            <h2>Asesoramos hoy, construimos el futuro</h2>
            <p>
                Soluciones estratégicas para el sector cannábico, con visión, sostenibilidad y cumplimiento normativo.
            </p>

        </div>
    </div>

</body>
</html>

</body>
</html>
