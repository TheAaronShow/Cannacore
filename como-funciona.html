<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cómo Funciona | CannaCore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial,sans-serif;
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* VIDEO */

.video-background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-2;
}

.video-background video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* OVERLAY */

.overlay{
    width:100%;
    min-height:100vh;
    background:rgba(0,0,0,0.72);
}

/* =========================
NAVBAR NUEVA ESTÉTICA
========================= */

.navbar{
    width:100%;
    position:fixed;
    top:0;
    left:0;
    padding:22px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(8px);
    background:rgba(0,0,0,0.20);
    border-bottom:1px solid rgba(255,255,255,0.05);
    z-index:1000;
}

.logo{
    font-size:1.2rem;
    font-weight:900;
    color:#c6ff00;
    letter-spacing:4px;
}

.navbar-links{
    display:flex;
    align-items:center;
    gap:38px;
}

.navbar a{
    text-decoration:none;
    color:white;
    font-family:'Arial Narrow',sans-serif;
    font-size:0.72rem;
    font-weight:700;
    letter-spacing:4px;
    text-transform:uppercase;
    cursor:pointer;
    transition:0.3s;
    opacity:0.88;
}

.navbar a:hover{
    color:#c6ff00;
    opacity:1;
}

/* BOTÓN PREMIUM */

.login-btn{

    background:#c6ff00;
    color:#000 !important;

    padding:14px 34px;

    border-radius:4px;

    font-size:0.70rem;
    font-weight:900;

    letter-spacing:5px;

    display:flex;
    align-items:center;
    justify-content:center;

    min-width:180px;
    height:52px;

    transition:0.3s;

    box-shadow:
    0 0 20px rgba(198,255,0,0.12);

}

.login-btn:hover{

    transform:translateY(-2px);

    background:#d7ff3f;

    box-shadow:
    0 0 28px rgba(198,255,0,0.22);

    color:#000 !important;
}

/* RESPONSIVE */

@media(max-width:900px){

    .navbar{
        padding:20px;
    }

    .navbar-links{
        gap:20px;
        flex-wrap:wrap;
        justify-content:flex-end;
    }

    .login-btn{
        min-width:150px;
        height:48px;
        padding:12px 24px;
    }
}

</style>
</head>

<body>

<!-- VIDEO -->

<div class="video-background">

    <video autoplay muted loop playsinline>

        <source src="canavid.mp4" type="video/mp4">

    </video>

</div>

<!-- OVERLAY -->

<div class="overlay">

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            CANNA CORE
        </div>

        <div class="navbar-links">

            <a href="index.html">EL MODELO</a>

            <a href="planes.html">PLANES</a>

            <a href="como-funciona.html">CÓMO EMPEZAR</a>

            <a href="#">IMPACTO</a>

            <a href="#" class="login-btn">
                INICIAR SESIÓN →
            </a>

        </div>

    </div>

</div>

</body>
</html>
