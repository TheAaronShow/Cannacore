
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CannaCore - Inicio</title>

    <style>
        /* Fondo completo sin recortes */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url("fondoo.jpg");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            padding: 15px 10px;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.30);
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #9fff55;
        }

        /* MENÚ DERECHO */
        .navbar-links {
            display: flex;
            gap: 25px;
            padding-right: 20px;
            transition: 0.3s ease;
        }

        .navbar a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #9fff55;
        }

        /* HAMBURGUESA */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: white;
            border-radius: 3px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .navbar-links {
                display: none; /* Se oculta el menú normal */
                position: absolute;
                top: 60px;
                right: 10px;
                background: rgba(0, 0, 0, 0.85);
                flex-direction: column;
                padding: 15px 20px;
                border-radius: 10px;
                gap: 15px;
            }

            .navbar-links.show {
                display: flex; /* Se muestra el menú al presionar */
            }

            .hamburger {
                display: flex; /* Ahora se muestra la hamburguesa */
            }
        }

        /* Zona central SIN TEXTO */
        .overlay {
            width: 100%;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            padding-top: 100px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <!-- LOGO IZQUIERDA -->
        <div class="logo">CANNA CORE</div>

        <!-- HAMBURGUESA (PC cuando ventana es pequeña + MÓVIL) -->
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- MENÚ DERECHO -->
        <div class="navbar-links" id="menu">
            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Nosotros</a>
            <a href="#">Contacto</a>
        </div>

    </div>

    <div class="overlay"></div>

    <script>
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("show");
        }
    </script>

</body>
</html>
