<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Requisitos | CannaCore</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial,sans-serif;
    overflow-x:hidden;
    background:#000;
    color:white;
}

/* VIDEO FONDO */

.video-background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-2;
}

.video-background video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* OVERLAY */

.overlay{
    width:100%;
    min-height:100vh;
    background:rgba(0,0,0,0.72);
    position:relative;
    z-index:1;
}

/* NAVBAR */

.navbar{
    width:100%;
    position:fixed;
    top:0;
    left:0;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.20);
    z-index:1000;
}

.logo{
    font-size:1.5rem;
    font-weight:900;
    color:#c6ff00;
}

.navbar-links{
    display:flex;
    gap:25px;
    align-items:center;
}

.navbar a{
    text-decoration:none;
    color:white;
    transition:0.3s;
    font-weight:500;
}

.navbar a:hover{
    color:#c6ff00;
}

.hamburger{
    display:none;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
}

.hamburger span{
    width:28px;
    height:3px;
    background:white;
    border-radius:3px;
}

/* SECCION VACIA */

.empty-page{
    width:100%;
    min-height:100vh;
}

/* RESPONSIVE */

@media(max-width:900px){

    .hamburger{
        display:flex;
    }

    .navbar-links{
        display:none;
        position:absolute;
        top:70px;
        right:15px;
        background:rgba(0,0,0,0.95);
        flex-direction:column;
        padding:20px;
        border-radius:10px;
        gap:18px;
        min-width:220px;
    }

    .navbar-links.show{
        display:flex;
    }
}

</style>

</head>

<body>

<!-- VIDEO FONDO -->

<div class="video-background">

    <video autoplay muted loop playsinline>
        <source src="canavid.mp4" type="video/mp4">
    </video>

</div>

<!-- OVERLAY -->

<div class="overlay">

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            CANNA CORE
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="navbar-links" id="menu">

            <a href="index.html">INICIO</a>
            <a href="planes.html">MEMBRESIA</a>
            <a href="como-funciona.html">COMO FUNCIONA</a>
            <a href="requisitos.html">REQUISITOS</a>
            <a href="contacto.htm">CONTACTO</a>

        </div>

    </div>

    <!-- PAGINA VACIA -->

    <div class="empty-page"></div>

</div>

<script>

function toggleMenu(){

    document.getElementById("menu")
    .classList.toggle("show");
}

</script>

</body>
</html>
