
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CannaCore - Inicio</title>

    <style>
        /* Fondo completo sin recortes */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url("fondoo.jpg");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            padding: 15px 10px;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.30);
            z-index: 1000;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #9fff55;
        }

        /* Links del menú (DESKTOP) */
        .navbar-links {
            display: flex;
            gap: 25px;
            padding-right: 20px;
        }

        .navbar a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #9fff55;
        }

        /* Botón hamburguesa (solo móvil) */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding-right: 15px;
        }

        .hamburger span {
            height: 3px;
            width: 28px;
            background: white;
            margin-bottom: 5px;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* MENÚ MÓVIL oculto */
        @media (max-width: 768px) {
            .navbar-links {
                position: absolute;
                top: 70px;
                right: 0;
                background: rgba(0, 0, 0, 0.85);
                backdrop-filter: blur(4px);
                width: 180px;
                flex-direction: column;
                padding: 15px;
                gap: 15px;
                display: none; /* oculto por defecto */
            }

            .navbar-links.active {
                display: flex; /* mostrar cuando se activa */
            }

            .hamburger {
                display: flex;
            }
        }

        /* Zona central */
        .overlay {
            width: 100%;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 100px;
            text-align: center;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        h2 {
            color: #9fff55;
            font-size: 1.7rem;
            font-weight: 600;
        }
        p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: auto;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <!-- IZQUIERDA -->
        <div class="logo">CANNA CORE</div>

        <!-- BOTÓN HAMBURGUESA MÓVIL -->
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- MENÚ -->
        <div class="navbar-links" id="navLinks">
            <a href="#">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Nosotros</a>
            <a href="#">Contacto</a>
        </div>

    </div>

    <!-- CONTENIDO CENTRAL -->
    <div class="overlay">
        <div class="wrapper">
            <h1>CANNA CORE GROUP</h1>
            <h2>Asesoramos hoy, construimos el futuro</h2>
            <p>
                Soluciones estratégicas para el sector cannábico, con visión, sostenibilidad y cumplimiento normativo.
            </p>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("navLinks").classList.toggle("active");
        }
    </script>

</body>
</html>
